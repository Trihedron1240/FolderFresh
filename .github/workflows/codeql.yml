name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - development
      - Development
  schedule:
    - cron: "23 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C#
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Restore
        run: dotnet restore FolderFresh.sln

      - name: Build
        run: dotnet build FolderFresh.sln -c Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v3
